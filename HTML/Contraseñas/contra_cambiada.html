<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contraseña cambiada</title>

    <link rel="stylesheet" href="./contra_cambiada.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="background">

        <div class="card">

            <div class="icono">

                <i class="fa-solid fa-circle-check"></i>

            </div>

            <h1>

                Contraseña cambiada
                <span>con éxito</span>

            </h1>

            <p>

                Tu contraseña fue actualizada correctamente.

                <br><br>

                Ahora puedes regresar al sistema e iniciar sesión con tu nueva contraseña.

            </p>

            <button
                id="btnRegresar"
                class="btn">

                <i class="fa-solid fa-house"></i>

                Volver al sistema

            </button>

        </div>

    </div>

    <script>

        document.getElementById("btnRegresar").addEventListener("click", () => {

            history.go(-2);

        });

    </script>

</body>

</html>
