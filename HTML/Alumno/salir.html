<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cerrar Sesión</title>

<link rel="stylesheet" href="../../CSS/cerrar_sesión.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="logout-container">

    <div class="header">

        <h1>Cerrar Sesión</h1>
        <p>Confirma que deseas salir del sistema.</p>

    </div>

    <div class="logout-card">

        <div class="icon-circle">
            <i class="fa-solid fa-right-from-bracket"></i>
        </div>

        <h2>¿Deseas cerrar tu sesión?</h2>

        <p class="description">
            Tu sesión finalizará de forma segura y podrás volver a iniciar sesión cuando lo desees.
        </p>

        <div class="warning">

            <i class="fa-solid fa-shield-halved"></i>

            <span>
                Tus datos permanecerán protegidos.
            </span>

        </div>

        <div class="buttons">

            <a href="../../index.html">

                <button class="logout-btn">

                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar sesión

                </button>

            </a>

            <button class="cancel-btn" onclick="history.back()">

                <i class="fa-solid fa-arrow-left"></i>
                Permanecer aquí

            </button>

        </div>

    </div>

</div>

</body>
</html>
